# FoodTech CI/CD Pipeline
# Shift-Left Quality: Bloquea integraciones defectuosas antes de main

name: FoodTech CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # JOB 1: LINT & TYPE CHECK (Bloqueante)
  # ==========================================
  lint:
    name: 🧹 Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍱 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 ESLint
        run: npm run lint

      - name: 🔍 TypeScript Check
        run: npx tsc --noEmit

  # ==========================================
  # JOB 2: COMPONENT TESTS (Caja Blanca)
  # Aisladas, sin dependencias externas
  # ==========================================
  component-tests:
    name: 🧪 Component Tests (Caja Blanca)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍱 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run Component Tests
        run: npm run test:ci

      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: component-test-results
          path: test-results/
          retention-days: 30

      - name: 📈 Coverage Report
        run: npm run test:coverage
        continue-on-error: true

      - name: 📤 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage
          retention-days: 30

  # ==========================================
  # JOB 3: INTEGRATION TESTS (Caja Negra)
  # E2E con Cypress mocks - sin backend real
  # ==========================================
  integration-tests:
    name: 🔗 Integration/E2E Tests (Caja Negra)
    runs-on: ubuntu-latest
    needs: component-tests
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧪 Run E2E Tests (Cypress)
        uses: cypress-io/github-action@v6
        with:
          browser: electron
          build: npm run build
          start: npm run preview -- --port 5173
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 60
          command: npx cypress run --project . --headless

  # ==========================================
  # JOB 4: SECURITY SCAN
  # Docker vulnerability scanning
  # ==========================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [component-tests]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker Image
        run: docker build -t foodtech:${{ github.sha }} .

      - name: 🔍 Docker Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'foodtech:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: 📤 Upload Security Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: trivy-results.sarif
          retention-days: 30

  # ==========================================
  # JOB 5: BUILD & PUBLISH
  # ==========================================
  build:
    name: 📦 Build Production
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🍱 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: foodtech-build
          path: dist/
          retention-days: 7

  # ==========================================
  # JOB 6: RELEASE (Solo en main)
  # ==========================================
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Version Tag
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          git tag $VERSION
          git push origin $VERSION

      - name: 📦 Download Build
        uses: actions/download-artifact@v4
        with:
          name: foodtech-build
          path: release/

      - name: 📝 Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          release_name: Release v1.0.${{ github.run_number }}
          draft: true
          prerelease: false
